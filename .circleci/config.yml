version: 2.1

orbs:
  win: circleci/windows@5.0

commands:
  install_dotnet_10:
    steps:
      - run:
          name: Install .NET 10 SDK
          command: |
            $ErrorActionPreference = "Stop"
            [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12

            $installDir = "$env:USERPROFILE\.dotnet"
            $installScript = "$env:TEMP\dotnet-install.ps1"

            Invoke-WebRequest "https://dot.net/v1/dotnet-install.ps1" -UseBasicParsing -OutFile $installScript
            & $installScript -Channel 10.0 -InstallDir $installDir -Architecture x64
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

            $env:PATH = "$installDir;$installDir\tools;$env:PATH"
            dotnet --info
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

jobs:
  sunder_build_test:
    executor:
      name: win/default
      size: medium
    steps:
      - checkout
      - install_dotnet_10
      - run:
          name: Build and test Sunder
          command: |
            $ErrorActionPreference = "Stop"
            $env:PATH = "$env:USERPROFILE\.dotnet;$env:USERPROFILE\.dotnet\tools;$env:PATH"

            function Invoke-Checked {
              param([scriptblock]$Command)

              & $Command
              if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            }

            Invoke-Checked { dotnet restore ".\Sunder.Core.slnx" }
            Invoke-Checked { dotnet build ".\Sunder.Core.slnx" -c Release --no-restore }

            New-Item -ItemType Directory -Force -Path ".\test-results" | Out-Null

            $testProjects = @(
              ".\tests\Sunder.App.Tests\Sunder.App.Tests.csproj",
              ".\tests\Sunder.PackageManagement.Tests\Sunder.PackageManagement.Tests.csproj",
              ".\tests\Sunder.Runtime.Host.Tests\Sunder.Runtime.Host.Tests.csproj"
            )

            foreach ($testProject in $testProjects) {
              $testName = Split-Path (Split-Path $testProject -Parent) -Leaf
              Invoke-Checked { dotnet test $testProject -c Release --logger "trx;LogFileName=$testName.trx" --results-directory ".\test-results\$testName" }
            }
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: test-results
          destination: test-results

  sunder_release:
    executor:
      name: win/default
      size: medium
    steps:
      - checkout
      - install_dotnet_10
      - run:
          name: Install Velopack CLI
          command: |
            $ErrorActionPreference = "Stop"
            $env:PATH = "$env:USERPROFILE\.dotnet;$env:USERPROFILE\.dotnet\tools;$env:PATH"

            dotnet tool install --global vpk --version 0.0.1298
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - run:
          name: Package Sunder win-x64
          command: |
            $ErrorActionPreference = "Stop"
            $env:PATH = "$env:USERPROFILE\.dotnet;$env:USERPROFILE\.dotnet\tools;$env:PATH"

            if ($env:CIRCLE_TAG -notmatch '^v(?<version>[0-9]+\.[0-9]+\.[0-9]+(?:[-+][0-9A-Za-z.-]+)?)$') {
              throw "Release tags must use SemVer format, for example v0.1.0."
            }

            .\scripts\release\package-sunder.ps1 -Version $Matches.version -Runtime win-x64
      - store_artifacts:
          path: artifacts/velopack/stable/win-x64
          destination: sunder-win-x64
      - run:
          name: Upload GitHub release assets
          command: |
            $ErrorActionPreference = "Stop"
            [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12

            if ([string]::IsNullOrWhiteSpace($env:GITHUB_TOKEN)) {
              throw "Set GITHUB_TOKEN in CircleCI with permission to create releases and upload assets."
            }

            if ($env:CIRCLE_TAG -notmatch '^v(?<version>[0-9]+\.[0-9]+\.[0-9]+(?:[-+][0-9A-Za-z.-]+)?)$') {
              throw "Release tags must use SemVer format, for example v0.1.0."
            }

            $tag = $env:CIRCLE_TAG
            $version = $Matches.version
            $repo = if ($env:CIRCLE_PROJECT_USERNAME -and $env:CIRCLE_PROJECT_REPONAME) {
              "$env:CIRCLE_PROJECT_USERNAME/$env:CIRCLE_PROJECT_REPONAME"
            } else {
              "Younics/sunder-core"
            }

            $headers = @{
              Authorization = "Bearer $env:GITHUB_TOKEN"
              Accept = "application/vnd.github+json"
              "X-GitHub-Api-Version" = "2022-11-28"
              "User-Agent" = "sunder-circleci-release"
            }

            $release = $null
            try {
              $release = Invoke-RestMethod -Headers $headers -Method Get -Uri "https://api.github.com/repos/$repo/releases/tags/$tag"
            } catch {
              if (-not $_.Exception.Response -or [int]$_.Exception.Response.StatusCode -ne 404) {
                throw
              }
            }

            if ($null -eq $release) {
              $body = @{
                tag_name = $tag
                name = "Sunder $version"
                draft = $false
                prerelease = $version.Contains("-")
              } | ConvertTo-Json

              $release = Invoke-RestMethod -Headers $headers -Method Post -Uri "https://api.github.com/repos/$repo/releases" -Body $body -ContentType "application/json"
            }

            $artifactDir = ".\artifacts\velopack\stable\win-x64"
            $assets = @(Get-ChildItem -LiteralPath $artifactDir -File)
            if ($assets.Count -eq 0) {
              throw "No Velopack artifacts found in $artifactDir."
            }

            $existingAssets = @(Invoke-RestMethod -Headers $headers -Method Get -Uri $release.assets_url)
            $uploadBase = $release.upload_url -replace '\{\?name,label\}$', ''

            foreach ($asset in $assets) {
              $matchingAssets = @($existingAssets | Where-Object { $_.name -eq $asset.Name })
              foreach ($matchingAsset in $matchingAssets) {
                Invoke-RestMethod -Headers $headers -Method Delete -Uri $matchingAsset.url | Out-Null
              }

              $uploadUri = "$uploadBase?name=$([Uri]::EscapeDataString($asset.Name))"
              Invoke-RestMethod -Headers $headers -Method Post -Uri $uploadUri -ContentType "application/octet-stream" -InFile $asset.FullName | Out-Null
            }

workflows:
  sunder:
    jobs:
      - sunder_build_test:
          filters:
            tags:
              only: /^v[0-9]+\.[0-9]+\.[0-9]+.*$/
      - sunder_release:
          requires:
            - sunder_build_test
          filters:
            branches:
              ignore: /.*/
            tags:
              only: /^v[0-9]+\.[0-9]+\.[0-9]+.*$/
