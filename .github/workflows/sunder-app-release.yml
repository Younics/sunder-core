name: Sunder App Release

on:
  push:
    tags:
      - "app/v*"

permissions: {}

concurrency:
  group: sunder-app-release-${{ github.ref }}
  cancel-in-progress: false

env:
  DOTNET_VERSION: "10.0.x"
  VELOPACK_VERSION: "0.0.1298"
  RELEASE_CHANNEL: stable
  RELEASE_REPO_URL: https://github.com/${{ github.repository }}

jobs:
  prepare:
    name: Prepare release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      is_prerelease: ${{ steps.release.outputs.is_prerelease }}
    steps:
      - name: Validate release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          if [[ ! "$tag" =~ ^app/v([0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?)$ ]]; then
            echo "App release tags must use SemVer format, for example app/v0.1.0 or app/v0.1.0-beta.1." >&2
            exit 1
          fi

          version="${BASH_REMATCH[1]}"
          is_prerelease="false"
          if [[ "$version" == *-* ]]; then
            is_prerelease="true"
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$is_prerelease" >> "$GITHUB_OUTPUT"

  package:
    name: Package ${{ matrix.runtime }}
    needs: prepare
    runs-on: ${{ matrix.os }}
    environment: sunder-app-signing
    permissions:
      contents: read
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runtime: win-x64
            os: windows-latest
          - runtime: win-arm64
            os: windows-latest
          - runtime: linux-x64
            os: ubuntu-24.04
          - runtime: linux-arm64
            os: ubuntu-24.04-arm
          - runtime: osx-x64
            os: macos-14
          - runtime: osx-arm64
            os: macos-14
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            ${{ env.DOTNET_VERSION }}
            8.0.x

      - name: Add .NET tools to PATH
        shell: pwsh
        run: |
          $toolsPath = if ($IsWindows) {
            Join-Path $env:USERPROFILE ".dotnet\tools"
          } else {
            Join-Path $env:HOME ".dotnet/tools"
          }

          $toolsPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Velopack CLI
        shell: pwsh
        run: dotnet tool install --global vpk --version $env:VELOPACK_VERSION

      - name: Azure login for Windows signing
        if: startsWith(matrix.runtime, 'win-')
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID || secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID || secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID || secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Configure Azure Trusted Signing
        id: windows-signing
        if: startsWith(matrix.runtime, 'win-')
        shell: pwsh
        env:
          AZURE_TRUSTED_SIGNING_ENDPOINT: ${{ vars.AZURE_TRUSTED_SIGNING_ENDPOINT || secrets.AZURE_TRUSTED_SIGNING_ENDPOINT }}
          AZURE_TRUSTED_SIGNING_ACCOUNT_NAME: ${{ vars.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME || secrets.AZURE_TRUSTED_SIGNING_ACCOUNT_NAME }}
          AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME: ${{ vars.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME || secrets.AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME }}
        run: |
          $ErrorActionPreference = "Stop"

          $requiredVariables = @(
            "AZURE_TRUSTED_SIGNING_ENDPOINT",
            "AZURE_TRUSTED_SIGNING_ACCOUNT_NAME",
            "AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME"
          )

          foreach ($variableName in $requiredVariables) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($variableName))) {
              throw "Azure Trusted Signing value '$variableName' is not configured on the GitHub environment."
            }
          }

          $nugetPath = Join-Path $env:RUNNER_TEMP "nuget.exe"
          $clientRoot = Join-Path $env:RUNNER_TEMP "artifact-signing-client"
          Invoke-WebRequest -Uri "https://dist.nuget.org/win-x86-commandline/latest/nuget.exe" -OutFile $nugetPath
          & $nugetPath install Microsoft.ArtifactSigning.Client -OutputDirectory $clientRoot -ExcludeVersion
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $dlib = Get-ChildItem -Path $clientRoot -Filter "Azure.CodeSigning.Dlib.dll" -Recurse |
            Where-Object { $_.FullName -match "[\\/]x64[\\/]" } |
            Select-Object -First 1
          if ($null -eq $dlib) {
            throw "Azure.CodeSigning.Dlib.dll was not found in the Artifact Signing client package."
          }

          $metadataPath = Join-Path $env:RUNNER_TEMP "trusted-signing-metadata.json"
          $metadata = [ordered]@{
            Endpoint = $env:AZURE_TRUSTED_SIGNING_ENDPOINT
            CodeSigningAccountName = $env:AZURE_TRUSTED_SIGNING_ACCOUNT_NAME
            CertificateProfileName = $env:AZURE_TRUSTED_SIGNING_CERTIFICATE_PROFILE_NAME
            CorrelationId = "sunder-app-${{ github.run_id }}-${{ matrix.runtime }}"
            ExcludeCredentials = @(
              "EnvironmentCredential",
              "ManagedIdentityCredential",
              "WorkloadIdentityCredential",
              "SharedTokenCacheCredential",
              "VisualStudioCredential",
              "VisualStudioCodeCredential",
              "AzurePowerShellCredential",
              "AzureDeveloperCliCredential",
              "InteractiveBrowserCredential"
            )
          }
          $metadata | ConvertTo-Json -Depth 4 | Out-File -FilePath $metadataPath -Encoding utf8

          "dlib_path=$($dlib.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "metadata_path=$metadataPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Configure Apple signing and notarization
        id: apple-signing
        if: startsWith(matrix.runtime, 'osx-')
        shell: bash
        env:
          APPLE_BUILD_CERTIFICATE_BASE64: ${{ secrets.APPLE_BUILD_CERTIFICATE_BASE64 }}
          APPLE_INSTALLER_CERTIFICATE_BASE64: ${{ secrets.APPLE_INSTALLER_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_KEYCHAIN_PASSWORD: ${{ secrets.APPLE_SIGNING_KEYCHAIN_PASSWORD }}
          APPLE_SIGN_APP_IDENTITY: ${{ secrets.APPLE_SIGN_APP_IDENTITY }}
          APPLE_SIGN_INSTALL_IDENTITY: ${{ secrets.APPLE_SIGN_INSTALL_IDENTITY }}
        run: |
          set -euo pipefail

          required_vars=(
            APPLE_BUILD_CERTIFICATE_BASE64
            APPLE_INSTALLER_CERTIFICATE_BASE64
            APPLE_CERTIFICATE_PASSWORD
            APPLE_ID
            APPLE_APP_SPECIFIC_PASSWORD
            APPLE_TEAM_ID
            APPLE_SIGNING_KEYCHAIN_PASSWORD
            APPLE_SIGN_APP_IDENTITY
            APPLE_SIGN_INSTALL_IDENTITY
          )

          for var_name in "${required_vars[@]}"; do
            if [[ -z "${!var_name:-}" ]]; then
              echo "Apple signing secret '$var_name' is not configured." >&2
              exit 1
            fi
          done

          decode_base64() {
            local value="$1"
            local output="$2"

            if printf '%s' "$value" | base64 --decode > "$output" 2>/dev/null; then
              return 0
            fi

            printf '%s' "$value" | base64 -D > "$output"
          }

          build_cert_path="$RUNNER_TEMP/apple-build-certificate.p12"
          installer_cert_path="$RUNNER_TEMP/apple-installer-certificate.p12"
          keychain_path="$RUNNER_TEMP/sunder-app-signing.keychain-db"
          notary_profile="sunder-app-notary"

          decode_base64 "$APPLE_BUILD_CERTIFICATE_BASE64" "$build_cert_path"
          decode_base64 "$APPLE_INSTALLER_CERTIFICATE_BASE64" "$installer_cert_path"

          security create-keychain -p "$APPLE_SIGNING_KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$APPLE_SIGNING_KEYCHAIN_PASSWORD" "$keychain_path"
          security default-keychain -s "$keychain_path"
          security list-keychains -d user -s "$keychain_path"

          security import "$build_cert_path" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security import "$installer_cert_path" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$APPLE_SIGNING_KEYCHAIN_PASSWORD" "$keychain_path" >/dev/null

          rm -f "$build_cert_path" "$installer_cert_path"

          xcrun notarytool store-credentials "$notary_profile" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --keychain "$keychain_path"

          echo "keychain_path=$keychain_path" >> "$GITHUB_OUTPUT"
          echo "notary_profile=$notary_profile" >> "$GITHUB_OUTPUT"

      - name: Package Sunder for Windows
        if: startsWith(matrix.runtime, 'win-')
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $dlibPath = "${{ steps.windows-signing.outputs.dlib_path }}"
          $metadataPath = "${{ steps.windows-signing.outputs.metadata_path }}"
          $windowsSignParams = "/fd SHA256 /td SHA256 /tr http://timestamp.acs.microsoft.com /dlib `"$dlibPath`" /dmdf `"$metadataPath`""

          $packageArgs = @{
            Version = "${{ needs.prepare.outputs.version }}"
            Runtime = "${{ matrix.runtime }}"
            Channel = "${{ env.RELEASE_CHANNEL }}"
            GitHubRepositoryUrl = "${{ env.RELEASE_REPO_URL }}"
            WindowsSignParams = $windowsSignParams
          }

          if ("${{ needs.prepare.outputs.is_prerelease }}" -eq "true") {
            $packageArgs.IncludePrereleaseUpdates = $true
          }

          ./scripts/release/package-sunder.ps1 @packageArgs

      - name: Package Sunder for Unix
        if: ${{ !startsWith(matrix.runtime, 'win-') }}
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_SIGN_APP_IDENTITY: ${{ secrets.APPLE_SIGN_APP_IDENTITY }}
          APPLE_SIGN_INSTALL_IDENTITY: ${{ secrets.APPLE_SIGN_INSTALL_IDENTITY }}
          APPLE_NOTARY_PROFILE: ${{ steps.apple-signing.outputs.notary_profile }}
          APPLE_KEYCHAIN_PATH: ${{ steps.apple-signing.outputs.keychain_path }}
        run: |
          set -euo pipefail

          package_args=(
            ./scripts/release/package-sunder.sh
            --version "${{ needs.prepare.outputs.version }}"
            --runtime "${{ matrix.runtime }}"
            --channel "${RELEASE_CHANNEL}"
            --github-repository-url "${RELEASE_REPO_URL}"
          )

          if [[ "${{ startsWith(matrix.runtime, 'osx-') }}" == "true" ]]; then
            package_args+=(
              --mac-bundle-id com.younics.sunder
              --mac-sign-app-identity "$APPLE_SIGN_APP_IDENTITY"
              --mac-sign-install-identity "$APPLE_SIGN_INSTALL_IDENTITY"
              --mac-notary-profile "$APPLE_NOTARY_PROFILE"
              --mac-keychain "$APPLE_KEYCHAIN_PATH"
            )
          fi

          if [[ "${{ needs.prepare.outputs.is_prerelease }}" == "true" ]]; then
            package_args+=(--include-prerelease-updates)
          fi

          bash "${package_args[@]}"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: sunder-${{ matrix.runtime }}
          path: artifacts/velopack/${{ env.RELEASE_CHANNEL }}/${{ matrix.runtime }}/*
          if-no-files-found: error
          retention-days: 7

      - name: Clean up Apple signing keychain
        if: ${{ always() && startsWith(matrix.runtime, 'osx-') }}
        shell: bash
        env:
          APPLE_KEYCHAIN_PATH: ${{ steps.apple-signing.outputs.keychain_path }}
        run: |
          set -euo pipefail

          if [[ -n "${APPLE_KEYCHAIN_PATH:-}" && -f "$APPLE_KEYCHAIN_PATH" ]]; then
            security delete-keychain "$APPLE_KEYCHAIN_PATH"
          fi

  publish:
    name: Publish GitHub Release
    needs:
      - prepare
      - package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Add .NET tools to PATH
        shell: bash
        run: echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Install Velopack CLI
        shell: bash
        run: dotnet tool install --global vpk --version "$VELOPACK_VERSION"

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Upload release assets
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.prepare.outputs.version }}
          IS_PRERELEASE: ${{ needs.prepare.outputs.is_prerelease }}
        run: |
          set -euo pipefail

          upload_args=(
            upload github
            --repoUrl "$RELEASE_REPO_URL"
            --token "$GITHUB_TOKEN"
            --publish
            --merge
            --releaseName "Sunder App $VERSION"
            --tag "app/v$VERSION"
          )

          if [[ "$IS_PRERELEASE" == "true" ]]; then
            upload_args+=(--pre)
          fi

          runtimes=(win-x64 win-arm64 linux-x64 linux-arm64 osx-x64 osx-arm64)
          for runtime in "${runtimes[@]}"; do
            output_dir="release-assets/sunder-$runtime"
            channel="app-$runtime-$RELEASE_CHANNEL"

            if [[ ! -d "$output_dir" ]]; then
              echo "Missing packaged artifact directory: $output_dir" >&2
              exit 1
            fi

            vpk "${upload_args[@]}" --channel "$channel" --outputDir "$output_dir"
          done
